<!DOCTYPE html>
<html lang="en">
<head>

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #0f172a; 
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            margin: 0;
        }

        .noise-bg {
            position: fixed; inset: 0; z-index: 50; pointer-events: none; opacity: 0.03;
            background-image: url('https://grainy-gradients.vercel.app/noise.svg');
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="noise-bg"></div>
    
    <div id="canvas-container" class="fixed top-0 left-0 w-full h-[100vh] z-0 pointer-events-none"></div>

    <nav class="fixed top-0 left-0 w-full p-6 md:p-8 flex justify-between items-center z-50 pointer-events-none">
        <div class="text-xs font-bold tracking-[0.3em] pointer-events-auto uppercase text-white">Adil Firoz Khan</div>
        <div class="hidden md:flex gap-8 pointer-events-auto font-medium">

            <div class="max-w-3xl pointer-events-auto -mt-40">

                    Hi, I'm Adil.
                </h1>

        </section>

        <section class="h-[800vh] w-full pointer-events-none"></section>

        <section class="py-32 px-[5%] w-full flex items-center justify-center relative z-20">
            <div class="max-w-2xl w-[90%] mx-auto pointer-events-auto bg-slate-900 border border-slate-700 rounded-[2rem] p-12 text-center shadow-2xl">
